<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Promise with Fetch</title>
</head>
<body>
    <script>

    // Promise create kar rahe hain jo API se data fetch karega
    const myPromise = new Promise((resolve, reject) => {

        // Artificial delay (5 sec) sirf simulation ke liye
        setTimeout(() => {

            // one way , its hardcoded - 
            //   const success = true;
            //   if(success){
            //      fetch('https://jsonplaceholder.typicode.com/users')
            //   .then(response => response.json())
            //   .then(data => resolve(data))
            //   .catch(error => reject(error));
            //   }
            //   else{
            //     reject("Some error is there while fetching")
            //   } 
    

            // 2nd way (actual fetch implementation)

            // API call kar rahe hain
            fetch('https://jsonplaceholder.typicode.com/users')

            .then(response => {

                // Response check kar rahe hain (status ok hai ya nahi)
                if (!response.ok) {
                    throw new Error("Failed to fetch users");
                }

                // JSON format me convert karna
                return response.json();
            })

            .then(data => {
                // Agar sab sahi hai to promise resolve kar do
                resolve(data);
            })

            .catch(error => {
                // Agar error aaye to promise reject kar do
                reject(error.message);
            });

        }, 5000); // delay close

    });


    // Yeh code turant run hoga (non-blocking behavior)
    console.log("fetching data .... is taking some time meanwhile this code is running");

    // Loop bhi turant run hoga (fetch ke wait nahi karega)
    for (let i = 0; i <= 3; i++) {
        console.log("Performing some other task while fetching data", i);
    }


    // Promise ka result handle kar rahe hain
    myPromise

    .then(users => {

        // Data successfully mil gaya
        document.write("<h2> Users Data received from API : </h2>");

        // Har user ka naam print kar rahe hain
        users.forEach(u => {
            document.write(`<p>${u.name}</p>`);
        });

    })

    .catch(error => {

        // Agar error aaya to show karenge
        document.write(`<p>${error}</p>`);
    });

    </script>
</body>
</html>

<!-- 
Promise create kiya → data fetch karega
setTimeout → delay sirf simulation ke liye
fetch → API call
resolve → jab data mil jaye
reject → jab error aaye
then → success handle
catch → error handle -->
