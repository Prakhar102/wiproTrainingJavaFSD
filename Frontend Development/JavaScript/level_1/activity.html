<!DOCTYPE html>
<html>
<head>
    <title>Discount</title>

<style>
    body {
            font-family: Arial;
            background: rgb(187, 187, 222);
            text-align: center;
            margin-top: 200px;
        }

        button{
            border: 2px solid black;
            padding: 10px 20px;
            cursor: pointer;
            border-radius: 16px;
            background-color: aqua;
            font-weight: bold;
        }
</style>

</head>

<body>

    <h1>
        Welcome to the Store! Get a 10% discount on products price above 1000.
    </h1>

<button onclick="calc()">Calculate</button>

<script>
function calc() {
    let name = prompt("Enter product name: ");
    let price = prompt("Enter price: ");
    price = Number(price);

    let new_price;

    if (price > 1000) {

        new_price = price - (price * 0.1);

    } 

    else {
        new_price = price;
    }

    alert("Product: " + name + "\nFinal Price: " + new_price);
    //console.log("Product: " + name + "\nFinal Price: " + new_price);
}
</script>

</body>
</html>
