<!-- Implement the following functionality using JavaScript :
1. Print all products names using map()
2. Print total price of all products using reduce()
3. Filter products with price greater than 1000 or take the input from the user using filter()  
4. create function calculateTotalItems() which will return total quantity
5. Display result using : interpolation or template literals
6. use arrow functions everywhere possible -->


<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    
    <script>
        let cart = [
    {id:1, name:"Laptop", price:60000, qty:2, category:"Electronics"},
    {id:2, name:"Mouse", price:500, qty:5, category:"Electronics"},
    {id:3, name:"Keyboard", price:1000, qty:3, category:"Electronics"},
    {id:4, name:"Monitor", price:15000, qty:2, category:"Electronics"},
    {id:5, name:"Wifi Router", price:2000, qty:1, category:"Electronics"},
    {id:6, name:"Shirt", price:2000, qty:4, category:"Clothing"},
    {id:7, name:"Jeans", price:3000, qty:2, category:"Clothing"},
    {id:8, name:"Almonds", price:500, qty:10, category:"Groceries"},
    {id:9, name:"Peanuts", price:300, qty:10, category:"Groceries"},
    {id:10, name:"Air-Conditioner", price:35000, qty:1, category:"Electronics"}
    ];

    
    const p_Names = cart.map(product => product.name);
    document.writeln(`Product Names : ${p_Names} <br>`);



    const t_price = cart.reduce((sum, product) => sum + (product.price * product.qty),0);
    document.writeln(`Total Price of all Products : ${t_price} <br>`);




    let price_limit = Number(prompt("Enter the price limit to filter products :")) || 1000;

    const f_Products = cart.filter(product => product.price > price_limit);
    document.writeln(`Products greater than ${price_limit} : <br>`);

    f_Products.forEach(product => {
        document.writeln(`${product.name} - ${product.price} <br>`);
    });



    
    const calculateTotalItems = () =>
    cart.reduce((sum, product) => sum + product.qty, 0);

     document.writeln(`Total Items Quantity: ${calculateTotalItems()}`);



    </script>
</body>
</html>
