<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Using Form</title>
</head>
<body>
    <h1>Welcome to the Store!</h1>

    <form action="">
        Product Name: <input type="text" name="p_Name"><br><br>
        Price: <input type="text" name="price"><br><br>
        <button type = "button" onclick="Calcu(this.form)">Calculate</button>
    </form>


    <script>
        function Calcu(form)
        {
            let name = form.p_Name.value;
            let price = form.price.value;
            price = Number(price);
            let new_price;

            if(price > 1000)
        {
            new_price = price - (price * 0.1);
        }

        else
        {
            new_price = price;
        }

        alert("Product: " + name + "\nFinal Price: " + new_price);
    }
    </script>
    
</body>
</html>
