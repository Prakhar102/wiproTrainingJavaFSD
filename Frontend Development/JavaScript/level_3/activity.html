<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Employee Dashboard</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <link rel="stylesheet" href="style.css">
</head>

<body class="ht-body">

<div class="container">

  <h2 class="mb-4">Employee Management Dashboard</h2>



  <!-- Form Section -->
  <div class="e_form">
    <h4 id="formTitle">Add Employee</h4>

    <input type="hidden" id="empId">

    <input type="text" id="name" class="form-control mb-2" placeholder="Enter Name">
    <input type="email" id="email" class="form-control mb-2" placeholder="Enter Email">

    <button class="btn btn-primary" onclick="AddEmployee()">Submit</button>
  </div>






  <!-- Table Section -->
  <table class="e_table">
    <thead>
      <tr>
        <th>Name</th>
        <th>Email</th>
        <th>Company</th>
        <th>Actions</th>
      </tr>
    </thead>

    <tbody id="tableBody"></tbody>
  </table>

</div>

<script src="script.js"></script>

</body>
</html>
