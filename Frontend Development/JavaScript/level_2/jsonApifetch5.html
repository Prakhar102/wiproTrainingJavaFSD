<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
     <!-- it is fetch based implementation-->
<h3> Users Data in JSON</h3>
<!-- first creating an element as li in html and then we will append the data to it using js -->
<ul id = "users"></ul>  

<script>
       // to retrieve the json data from this api
       fetch('https://jsonplaceholder.typicode.com/users') 
       // convert response to json where .json() will automatically parses the data and (internally it uses JSON.parse())
      //JSON.parse(jsonString) -- converts json string to js object -- mainly we use when receiving the data from a server
       .then(response => response.json()) 
      .then(data =>
      {
        const ul = document.getElementById("users"); // to get the ul element from html where we want to append the data
        data.slice(0,5).forEach(user => {                       // to iterate through each user in the data array and for each user we will create a list item (li) element
   
   const li =  document.createElement("li");
   li.textContent = `User Name : ${user.username} - EMail : ${user.email}`;  //text content means it will set the text content of the li element to the user name and email in a formatted way using template literals
   //unordered list will append the li that contains the user name and email to the ul element in html
   ul.append(li); 
      });
    })
    .catch(err => console.error("Error while loading the data", err));

    </script>
</body>
</html>


<!-- data.slice(0,5) -- it will take the first 5 users from the data array and then for each user it will 
create a list item (li) element and set its text content to the user name and email in a formatted way using 
template literals. Finally, it will append the li element to the ul element in html, which will display the 
user information on the webpage. -->
