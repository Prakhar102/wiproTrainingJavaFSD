<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DOM</title>
</head>
<body>

    <h1 id = "domC">DOM Concept</h1>

    <button id = "chngtext">Click me</button>

    <script>
        const button = document.getElementById("chngtext");

        button.addEventListener("click", function()   // addEVentlistner work when you click the button and it will execute the function that we have passed as a parameter to it.
        {
            document.getElementById("domC").innerHTML = "DOM is used to interact with the HTML elements using JavaScript";
        })
    </script>
    
</body>
</html>
