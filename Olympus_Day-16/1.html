<!DOCTYPE html>
<html>
<head>
  <title>Fetching API</title>
</head>
<body>

<script>
const apiUrl = "https://dummy.restapiexample.com/api/v1/employees";

fetch(apiUrl)
  .then(response => {

    if (!response.ok) 
    {
      throw new Error("Failed to fetch");
    }
    return response.json();
  })
  .then(data => {
    console.log("Employee Data:", data);
  })

  .catch(error => {
    console.error("Error:", error);
  });
</script>

</body>
</html>
