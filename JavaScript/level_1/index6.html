    // Objects and Arrays in JavaScript
    // An object is a collection of properties, where each property is a key-value pair.
    // An array is an ordered list of values, which can be of any type, including objects and other arrays.

    const user = {

    }

    <script>

        let student = {}; // It will create an empty object   

        let person={

            firstName : "Niti",
            lastName : " Dwivedi"
        }                                // These are attributes of a Person class object 

        person.firstName = "Jatin"   // this will update the value of firstName attribute of person class object to "Jatin" and it will not create a new attribute because we are using dot notation to access the attribute and update its value.
        person.lastName = " Mehta"

        person.age =78;  // Adding a new attribute to a person class object

        console.log(person); // to print the entire object details
