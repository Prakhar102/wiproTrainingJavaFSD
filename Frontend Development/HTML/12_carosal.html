
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-ka7Sk0Gln4gmtz2MlQnikT1wXgYsOg+OMhuP+IlRH9sENBO0LRn5q+8nbTov4+1p" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="../CSS/style.css">

<body>
    <!-- To add a blue box with space inside (Padding) and space outside (margin)-->
    <div class="box">
        One Box is created 
    </div>

    <!-- 
    Flexbox  it is mainly used to align items in a row or column
    generally used  in Navbar ,  Header , cards , button alignment-->
   <!-- for placing logo on left , menu center , profile on right-->
    <div class="container">
        <div>logo</div>
        <div> Menu</div>
        <div>Profile</div>
    </div>

     <div class="container1">
        <div><button type="button" class="btn btn-primary">Primary</button></div>
        <div> <button type="button" class="btn btn-success">Success</button></div>
        <div><button type="button" class="btn btn-info">Info</button></div>
    </div>

<!-- Caraousel -->
<div id="carouselExampleIndicators" class="carousel slide">
  <div class="carousel-indicators">
    <button type="button" data-bs-target="#carouselExampleIndicators" data-bs-slide-to="0" class="active" aria-current="true" aria-label="Slide 1"></button>
    <button type="button" data-bs-target="#carouselExampleIndicators" data-bs-slide-to="1" aria-label="Slide 2"></button>
    <button type="button" data-bs-target="#carouselExampleIndicators" data-bs-slide-to="2" aria-label="Slide 3"></button>
  </div>
  <div class="carousel-inner">
    <div class="carousel-item active">
      <img src="https://wallpapercave.com/wp/wp2722874.jpg" class="d-block w-100" alt="...">
    </div>
    <div class="carousel-item">
      <img src="https://wallpapercave.com/wp/wp2858551.jpg" class="d-block w-100" alt="...">
    </div>
    <div class="carousel-item">
      <img src="https://images.pexels.com/photos/31284696/pexels-photo-31284696.jpeg?cs=srgb&dl=pexels-optical-chemist-340351297-31284696.jpg&fm=jpg" class="d-block w-100" alt="...">
    </div>
  </div>
  <button class="carousel-control-prev" type="button" data-bs-target="#carouselExampleIndicators" data-bs-slide="prev">
    <span class="carousel-control-prev-icon" aria-hidden="true"></span>
    <span class="visually-hidden">Previous</span>
  </button>
  <button class="carousel-control-next" type="button" data-bs-target="#carouselExampleIndicators" data-bs-slide="next">
    <span class="carousel-control-next-icon" aria-hidden="true"></span>
    <span class="visually-hidden">Next</span>
  </button>
</div>


<!-- Card-->
    <div class="container1">
    <div class="card">Card 1</div>
    <div class="card">Card 2</div>
    </div>

    <!-- Grid
     use to create rows and columns easily like dashboard , galleries , card layouts-->

     <div class="grid">
        <div class="box1">1 box</div>
         <div class="box1">2 box</div>
          <div class="box1">3 box</div>
     </div>

     <!-- Responsive CSS @MediaQuery used for mobile , tablet and desktop-->

     <div class="box2">
        To check the resizing on differenct screen
     </div>
</body>
</html>
